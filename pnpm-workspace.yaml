packages:
  - apps/*
  - packages/*
  # Stage 1: include examples so monorepo installs can link @faraday-academy/*
  # before/while registry publish. Independent Vercel deploys still work once
  # packages are on npm (Root Directory = examples/<name> → registry install).
  - examples/*
allowBuilds:
  # Vite/labs bundles with esbuild — allow its native binary to build.
  esbuild: true

# Until @faraday-academy/* is on npm, force examples to the workspace packages.
preferWorkspacePackages: true
linkWorkspacePackages: true
overrides:
  "@faraday-academy/runtime": "workspace:*"
  "@faraday-academy/three": "workspace:*"
  "@faraday-academy/tutor": "workspace:*"
