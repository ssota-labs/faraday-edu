packages:
  - apps/*
  - packages/*
  - e2e
allowBuilds:
  # Vite/labs bundles with esbuild — allow its native binary to build.
  '@swc/core': true
  cbor-extract: true
  esbuild: true
  # Next.js image optimization (apps/platform)
  sharp: true

preferWorkspacePackages: true
linkWorkspacePackages: true
overrides:
  "@faraday-academy/kit": "workspace:*"
  "@faraday-academy/lms": "workspace:*"
  "@faraday-academy/ui": "workspace:*"
minimumReleaseAgeExclude:
  - '@assetvault/cli@0.1.0'
