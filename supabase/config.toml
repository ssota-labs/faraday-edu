# Faraday Academy — local Supabase (ssota-parity ports)
project_id = "faraday"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3100"
additional_redirect_urls = [
  "http://127.0.0.1:3100",
  "http://localhost:3100",
  "http://127.0.0.1:3000",
  "http://localhost:3000",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true
