# Deploy Stage 1 demos to GitHub Pages (static dist/).

# Vercel remains the primary host once NPM_TOKEN + Vercel project exist;
# this workflow gives a public URL without those secrets by building from
# the monorepo workspace link.

name: deploy-demos-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "packages/**"
      - ".github/workflows/deploy-demos-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install
      - name: Build demos
        run: |
          pnpm --filter compound-interest build
          pnpm --filter voyage-log build
          mkdir -p site/compound-interest site/voyage-log
          cp -R examples/compound-interest/dist/. site/compound-interest/
          cp -R examples/voyage-log/dist/. site/voyage-log/
          cat > site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8" />
          <title>Faraday Stage 1 demos</title>
          <h1>Faraday Stage 1 demos</h1>
          <ul>
            <li><a href="./compound-interest/">S1 — Compound interest</a></li>
            <li><a href="./voyage-log/">C★ — Voyage log</a></li>
          </ul>
          <pre>/plugin marketplace add ssota-labs/faraday-academy
          /plugin install faraday@faraday</pre>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
