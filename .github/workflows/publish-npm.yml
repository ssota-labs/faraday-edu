# Disabled: npm suite publish is not the 3d-stem product path (PLAN-001).
# Kept as a no-op workflow so old tags do not publish legacy packages accidentally.
name: publish-npm

on:
  workflow_dispatch:

jobs:
  refused:
    runs-on: ubuntu-latest
    steps:
      - name: Refuse npm product publish
        run: |
          echo "npm @faraday-academy/* publish is retired."
          echo "Ship the 3d-stem skill via git tags / marketplace, not npm suite publish."
          exit 1
