packages:
  - apps/*
  - packages/*
allowBuilds:
  # Vite/labs bundles with esbuild — allow its native binary to build.
  esbuild: true

# examples/* are intentionally NOT workspace members — each example (e.g.
# voyage-log) is a self-contained generated app with its own lockfile and is
# deployed independently (Vercel root = platform/examples/<name>).
